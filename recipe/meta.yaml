{% set version = "2.17" %}
{% set nccl_submodule_rev = "a6b5de08b6af4f938cef541ae6e4d405632f89a4" %}
{% set torch_proc_type = "cuda" if cuda_compiler_version != "None" else "cpu" %}

package:
  name: transformer-engine
  version: "{{ version }}"

source:
  - url: https://github.com/NVIDIA/TransformerEngine/archive/refs/tags/v{{ version }}.tar.gz
    sha256: c87d17e1601ecce3e99be9d9fea0d59f9dcea81974ac6633051fcfe5e4d4c4f9
    patches:
      - 001-cmake.patch
      - 002-nccl-ep-ignore-conda-ldflags.patch

  - url: https://github.com/NVIDIA/nccl/archive/{{ nccl_submodule_rev }}.tar.gz
    sha256: 61a373de480401cf3be2227ce36121914e384bd6fb0201e76b4a22b2de4f284c
    folder: 3rdparty/nccl

  - url: https://github.com/NVIDIA/cudnn-frontend/archive/refs/tags/v1.22.0.tar.gz
    sha256: da6f23da7ede9e0ad22fa9fec9ef266e3d2fd581aab385c14a465a2d737ce002
    folder: 3rdparty/cudnn-frontend

  - url: https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
    sha256: 8ad598c73ad796e0d8280b082cebd82a630d73e73cd3c70057938a6501bba5d7
    folder: 3rdparty/googletest

build:
  number: 0

outputs:
  - name: transformer-engine-torch
    version: "{{ version }}"
    script: build_te.sh

    build:
      skip: true  # [py==39]
      skip: true  # [cuda_compiler_version == "None"]
      skip: true  # [not (linux64 or aarch64)]
      script_env:
        - CUDA_HOME={{ BUILD_PREFIX }}
        - NVTE_FRAMEWORK=pytorch
      missing_dso_whitelist:
        # libcuda is supplied by the host NVIDIA driver, not a conda package.
        - "*/libcuda.so.1"  # [linux]

      run_exports:
        - {{ pin_subpackage('transformer-engine-torch', max_pin='x.x') }}
      # NVTX is used through headers/PyTorch, not a DSO in this package.
      ignore_run_exports:
        - cuda-nvtx
        # PyTorch CUDA headers need cusparse.h at build time, but TE does not
        # link libcusparse at runtime.
        - libcusparse
        # Likewise, PyTorch CUDA headers need cusolverDn.h only while compiling.
        - libcusolver

    requirements:
      build:
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - pytorch                                # [build_platform != target_platform]
        - pytorch * {{ torch_proc_type }}*       # [build_platform != target_platform]
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('cuda') }}  # [cuda_compiler_version not in (undefined, 'None')]
        - cutlass
        - cuda-nvvm
        - cmake >=3.21
        - make
        - ninja

      host:
        - python
        - pip
        - pybind11
        - pytorch
        - pytorch * {{ torch_proc_type }}*
        - setuptools
        - pydantic
        - importlib-metadata >=1.0
        - packaging
        - cuda-version {{ cuda_compiler_version }}
        - cuda-driver-dev
        - cuda-cudart-dev
        - cuda-nvrtc-dev
        - cuda-nvtx-dev
        - cuda-nvml-dev
        - libcublas-dev
        - libcusparse-dev
        - libcusolver-dev
        - libcurand-dev
        - libcudnn-dev
        - cuda-profiler-api
        - nccl >=2.30.4

      run:
        - python
        - pydantic
        - packaging
        - importlib-metadata >=1.0
        - einops
        - onnxscript
        # Loaded unconditionally by transformer_engine.common at import time.
        - cuda-nvrtc
        - libcurand

      run_constrained:
        # additional run constraint to the one from the (version-only) run_export;
        # constraining the CPU builds to CPU pytorch isn't 100% necessary, but cleaner
        - pytorch * {{ torch_proc_type }}*

    test:
      requires:
        - cuda-driver-dev
      commands:
        # CI runners do not provide the NVIDIA driver library. Preload the
        # driver stub so imports can still validate the packaged extensions.
        - export LD_PRELOAD="$PREFIX/lib/stubs/libcuda.so"
        - python -c "import transformer_engine.pytorch"
        - python -c "import transformer_engine.common"
        - python -c "import transformer_engine.common.recipe"
        - python -c "from transformer_engine.pytorch import ep"

about:
  home: https://github.com/NVIDIA/TransformerEngine
  summary: A library for accelerating Transformer models on NVIDIA GPUs.
  license: Apache-2.0 AND MIT
  license_file:
    - LICENSE
    - 3rdparty/nccl/contrib/nccl_ep/LICENSE.txt
    - 3rdparty/nccl/contrib/nccl_ep/ThirdPartyNotices.txt
  dev_url: https://github.com/NVIDIA/TransformerEngine

extra:
  feedstock-name: transformer-engine
  recipe-maintainers:
    - pstjohn
